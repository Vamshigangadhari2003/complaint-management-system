<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComplaintMS - Smart Complaint Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #050510;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg canvas {
            position: absolute;
            inset: 0;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: orbFloat 10s ease-in-out infinite;
        }

        .orb1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, #6c63ff88, transparent);
            top: -200px; left: -200px;
            animation-delay: 0s;
        }

        .orb2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #00d2ff66, transparent);
            bottom: -150px; right: -150px;
            animation-delay: -5s;
        }

        .orb3 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #ff6b6b44, transparent);
            top: 40%; left: 40%;
            animation-delay: -3s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -40px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
            75% { transform: translate(20px, 20px) scale(1.05); }
        }

        /* Grid overlay */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 1.5rem;
        }

        /* Login card */
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            box-shadow:
                0 0 0 1px rgba(108,99,255,0.1),
                0 40px 80px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.1);
            animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Logo section */
        .logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #6c63ff, #00d2ff);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1rem;
            box-shadow: 0 10px 40px rgba(108,99,255,0.4);
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 10px 40px rgba(108,99,255,0.4); }
            50% { box-shadow: 0 10px 60px rgba(108,99,255,0.7), 0 0 0 10px rgba(108,99,255,0.1); }
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #00d2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: rgba(255,255,255,0.4);
            font-size: 0.82rem;
            margin-top: 0.3rem;
            letter-spacing: 0.5px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
        }

        .tab {
            flex: 1;
            padding: 0.65rem;
            text-align: center;
            border-radius: 9px;
            cursor: pointer;
            color: rgba(255,255,255,0.4);
            font-size: 0.88rem;
            font-weight: 600;
            transition: all 0.3s ease;
            user-select: none;
        }

        .tab.active {
            background: linear-gradient(135deg, #6c63ff, #00d2ff);
            color: white;
            box-shadow: 0 4px 15px rgba(108,99,255,0.3);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Form */
        .form-group { margin-bottom: 1.2rem; }

        .form-group label {
            display: block;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            opacity: 0.5;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: white;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #6c63ff;
            background: rgba(108,99,255,0.08);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
        }

        .form-group input::placeholder { color: rgba(255,255,255,0.2); }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #6c63ff 0%, #00d2ff 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #00d2ff 0%, #6c63ff 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .submit-btn:hover::before { opacity: 1; }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(108,99,255,0.4);
        }

        .submit-btn:active { transform: translateY(0); }

        .submit-btn span { position: relative; z-index: 1; }

        /* Bottom text */
        .bottom-text {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.78rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 0.88rem;
            z-index: 9999;
            animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
            max-width: 320px;
        }

        .toast-success {
            background: linear-gradient(135deg, rgba(0,200,100,0.9), rgba(0,150,80,0.9));
            border: 1px solid rgba(0,230,118,0.3);
        }

        .toast-error {
            background: linear-gradient(135deg, rgba(255,80,80,0.9), rgba(200,40,40,0.9));
            border: 1px solid rgba(255,82,82,0.3);
        }

        @keyframes toastIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
<!-- Background -->
<div class="bg">
    <div class="gradient-orb orb1"></div>
    <div class="gradient-orb orb2"></div>
    <div class="gradient-orb orb3"></div>
</div>
<div class="grid-overlay"></div>

<!-- Login Card -->
<div class="container">
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🛡️</div>
            <h1>ComplaintMS</h1>
            <p>SMART COMPLAINT MANAGEMENT SYSTEM</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Sign In</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <!-- Login -->
        <div class="tab-content active" id="login-tab">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="login-email" placeholder="you@example.com">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="login-password" placeholder="Enter your password">
                </div>
            </div>
            <button class="submit-btn" onclick="handleLogin()">
                <span>Sign In →</span>
            </button>
        </div>

        <!-- Register -->
        <div class="tab-content" id="register-tab">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="reg-name" placeholder="Your full name">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="reg-email" placeholder="you@example.com">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="reg-password" placeholder="Min 6 characters">
                </div>
            </div>
            <button class="submit-btn" onclick="handleRegister()">
                <span>Create Account →</span>
            </button>
        </div>

        <div class="bottom-text">
            Secured with JWT Authentication 🔐
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
<script>
    if (getToken()) {
        const user = getUser();
        redirectByRole(user.role);
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
        });
        document.querySelectorAll('.tab-content').forEach((t, i) => {
            t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
        });
    }

    function redirectByRole(role) {
        if (role === 'ADMIN') window.location.href = '/pages/admin.html';
        else if (role === 'AGENT') window.location.href = '/pages/agent.html';
        else window.location.href = '/pages/user.html';
    }

    async function handleLogin() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        if (!email || !password) { showToast('Please fill all fields!', 'error'); return; }
        try {
            const res = await apiCall('/auth/login', 'POST', { email, password });
            const data = await res.json();
            if (res.ok) {
                setAuth(data);
                showToast('Welcome back! Redirecting...', 'success');
                setTimeout(() => redirectByRole(data.role), 1200);
            } else {
                showToast(data.message || 'Invalid credentials!', 'error');
            }
        } catch (err) { showToast('Connection error!', 'error'); }
    }

    async function handleRegister() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        if (!name || !email || !password) { showToast('Please fill all fields!', 'error'); return; }
        try {
            const res = await apiCall('/auth/register', 'POST', { name, email, password });
            const data = await res.json();
            if (res.ok) {
                showToast('Account created! Please login.', 'success');
                switchTab('login');
            } else {
                showToast(data.message || 'Registration failed!', 'error');
            }
        } catch (err) { showToast('Connection error!', 'error'); }
    }

    function showToast(message, type = 'info') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const activeTab = document.querySelector('.tab-content.active').id;
            if (activeTab === 'login-tab') handleLogin();
            else handleRegister();
        }
    });
</script>
</body>
</html>
